# ─────────────────────────────────────────────────────────────
#  Radar-Camera Fusion JEPA — Default Configuration
# ─────────────────────────────────────────────────────────────

# Dataset
dataset:
  nuscenes_root: "/data/nuscenes"
  version: "v1.0-mini"          # "v1.0-trainval" for full benchmark
  image_size: [448, 800]        # (H, W)
  max_radar_points: 256
  use_future_frame: true

# Model
model:
  type: "jepa"
  pretrained: true
  light_backbone: false         # 3-block ResNet for low VRAM
  image_feat_dim: 512
  radar_dim: 128
  latent_dim: 256
  max_objects: 50
  num_modes: 5                  # trajectory prediction modes
  pred_steps: 12                # 6 seconds @ 2 Hz
  agent_state_dim: 3            # velocity, acceleration, heading_change_rate
  decoder_heads: 8              # attention heads in object decoder
  decoder_layers: 2             # cross-attention layers in object decoder

# Training
training:
  epochs: 50
  batch_size: 4
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_accum_steps: 4
  amp_enabled: true
  ema_momentum: 0.996
  num_workers: 4
  checkpoint_dir: "checkpoints"
  log_interval: 50
  loss_weights:
    jepa: 1.0
    detection: 1.0
    velocity: 0.5
    trajectory: 1.0

# LR scheduler
scheduler:
  type: "cosine"                # cosine | step
  T_max: 50                    # for cosine
  step_size: 15                 # for step
  gamma: 0.1

# Prediction
prediction:
  seconds: 6.0                  # prediction horizon
  hz: 2                         # sampling rate → 12 timesteps
  miss_threshold: 2.0           # metres, for miss rate metric
  submission_path: "prediction_submission.json"

# Evaluation
eval:
  batch_size: 8
  iou_thresholds: [0.3, 0.5, 0.7]
  dist_thresholds: [0.5, 1.0, 2.0, 4.0]
  multi_gpu: true               # use all GPUs for eval

# BEV grid (for BEV model / CUDA voxelization)
bev:
  x_bounds: [-50.0, 50.0]
  y_bounds: [-50.0, 50.0]
  grid_h: 200
  grid_w: 200

# Stress testing
stress_test:
  augmentations:
    low_light:
      factors: [0.5, 0.3, 0.1]
    fog:
      severities: [0.3, 0.5, 0.8]
      kernel_size: 15
    occlusion:
      num_patches: [1, 3, 5]
      patch_size: 64

# Inference
inference:
  checkpoint: "checkpoints/best.pt"
  confidence_threshold: 0.3
  image_size: [448, 800]
  show_velocity: true
  show_radar: true
  video_source: 0               # webcam index or video file path
  save_output: null              # path to save output video, null to disable
